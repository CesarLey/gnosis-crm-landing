<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Gnosis CRM — La Plataforma Inteligente para Gestionar tu Negocio</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Gnosis CRM es la plataforma todo-en-uno con Inteligencia Artificial para gestionar clientes, ventas, campañas, inventario y más. Potencia tu negocio desde un solo lugar.">
  <meta name="theme-color" content="#0f172a">

  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Gnosis CRM — Gestiona tu Negocio con IA">
  <meta property="og:description" content="Plataforma CRM inteligente con co-piloto de IA, campañas, ventas, inventario y más. Prueba gratis.">
  <meta property="og:image" content="assets/dashboard.png">
  <meta property="og:locale" content="es_MX">

  <link rel="icon" type="image/jpg" href="assets/favicon.jpg">

  <!-- Google Fonts: Outfit + Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
  <app-root>
    <!-- Splash Screen — Angular removes this on boot -->
    <style>
      .gnosis-splash {
        position: fixed;
        inset: 0;
        background: #0a0f1c;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        font-family: 'Outfit', sans-serif;
      }

      .splash-logo {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 40px;
        animation: splashFadeIn 0.8s ease-out;
      }

      .splash-logo-icon {
        width: 52px;
        height: 52px;
        border-radius: 14px;
        background: linear-gradient(135deg, #00BFA6 0%, #00f2fe 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        animation: splashPulse 2s ease-in-out infinite;
      }

      .splash-logo-icon svg {
        width: 28px;
        height: 28px;
        fill: white;
      }

      .splash-logo-text {
        font-size: 1.8rem;
        font-weight: 800;
        color: #f8fafc;
        letter-spacing: 4px;
      }

      .splash-bar-track {
        width: 200px;
        height: 3px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 4px;
        overflow: hidden;
        animation: splashFadeIn 1s ease-out 0.3s both;
      }

      .splash-bar-fill {
        height: 100%;
        width: 40%;
        border-radius: 4px;
        background: linear-gradient(90deg, #00BFA6, #00f2fe);
        animation: splashLoad 1.5s ease-in-out infinite;
      }

      .splash-text {
        margin-top: 16px;
        color: #475569;
        font-size: 0.8rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        animation: splashFadeIn 1s ease-out 0.5s both;
      }

      .splash-dots span {
        animation: splashDot 1.4s infinite;
      }
      .splash-dots span:nth-child(2) { animation-delay: 0.2s; }
      .splash-dots span:nth-child(3) { animation-delay: 0.4s; }

      @keyframes splashFadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes splashPulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(0, 191, 166, 0.25); }
        50% { box-shadow: 0 0 0 12px rgba(0, 191, 166, 0); }
      }

      @keyframes splashLoad {
        0% { transform: translateX(-100%); }
        50% { transform: translateX(250%); }
        100% { transform: translateX(-100%); }
      }

      @keyframes splashDot {
        0%, 80%, 100% { opacity: 0.3; }
        40% { opacity: 1; }
      }
    </style>
    <div class="gnosis-splash">
      <div class="splash-logo">
        <div class="splash-logo-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
          </svg>
        </div>
        <span class="splash-logo-text">GNOSIS</span>
      </div>
      <div class="splash-bar-track">
        <div class="splash-bar-fill"></div>
      </div>
      <div class="splash-text">
        Cargando<span class="splash-dots"><span>.</span><span>.</span><span>.</span></span>
      </div>
    </div>
  </app-root>
</body>

</html>
